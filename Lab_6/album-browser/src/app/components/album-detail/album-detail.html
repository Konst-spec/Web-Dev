<div class="container">
  @if (loading()) {
    <div class="loading">
      <div class="spinner"></div>
      <p>Загрузка альбома...</p>
    </div>
  }

  @if (!loading() && album(); as album) {
    <div class="album-detail">
      <h2>Детали альбома #{{ album.id }}</h2>

      <div class="info-card">
        <div class="info-row">
          <label>ID:</label>
          <span>{{ album.id }}</span>
        </div>

        <div class="info-row">
          <label>User ID:</label>
          <span>{{ album.userId }}</span>
        </div>


        <div class="info-row edit-row">
          <label>Название:</label>
          <input
            type="text"
            [ngModel]="editedTitle()"
            (ngModelChange)="editedTitle.set($event)"
            class="title-input"
            placeholder="Введите название альбома"
          >
        </div>


        <div class="actions">
          <button
            (click)="saveAlbum()"
            class="btn-save"
            [disabled]="editedTitle() === album.title"
          >
            Сохранить
          </button>

          @if (editedTitle() !== album.title) {
            <button (click)="cancelEdit()" class="btn-cancel">
              Отмена
            </button>
          }
        </div>
      </div>


      <div class="nav-buttons">
        <button (click)="viewPhotos()" class="btn-photos">
          📸 Смотреть фото
        </button>

        <button (click)="goBack()" class="btn-back">
          ← Назад к списку
        </button>
      </div>
    </div>
  }
</div>
