<div class="search">
  <input type="text" placeholder="Search" [(ngModel)]="search" (ngModelChange)="filterProducts()"/>
</div>

<div class="product-grid">

  @for (item of filteredProducts; track item.id) {
    <product-card [product]="item" (delete)="onDelete($event)"></product-card>
  }

</div>
@if (filteredProducts.length === 0) {
  <p>No products found</p>
}
